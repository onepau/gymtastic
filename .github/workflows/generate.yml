name: Generate content

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "Keyword / topic (ignored when seeds_file is set)"
        required: false
      page_type:
        description: "Page type"
        required: false
        default: auto
        type: choice
        options:
          [
            auto,
            blog,
            hub,
            how-to,
            glossary,
            comparison,
            listicle,
            review,
            alternatives,
            landing,
          ]
      expand:
        description: "Expand keyword into N variations (leave blank to skip)"
        required: false
        default: ""
      seeds_file:
        description: "Seeds CSV path relative to repo root (e.g. seeds.csv)"
        required: false
        default: ""
      competitor:
        description: "Competitor sitemap URL for gap analysis (optional)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --prefix . 2>/dev/null || true

      - name: Generate content with ContentClaw
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""

          # Seeds file takes priority over keyword
          if [ -n "${{ inputs.seeds_file }}" ]; then
            ARGS="$ARGS --input ${{ inputs.seeds_file }}"
          elif [ -n "${{ inputs.keyword }}" ]; then
            ARGS="$ARGS \"${{ inputs.keyword }}\""
            if [ -n "${{ inputs.expand }}" ]; then
              ARGS="$ARGS --expand ${{ inputs.expand }}"
            fi
            if [ -n "${{ inputs.page_type }}" ] && [ "${{ inputs.page_type }}" != "auto" ]; then
              ARGS="$ARGS --type ${{ inputs.page_type }}"
            fi
          fi

          if [ -n "${{ inputs.competitor }}" ]; then
            ARGS="$ARGS --competitor ${{ inputs.competitor }}"
          fi

          eval npx contentclaw generate $ARGS --yes

      - name: Export to D1 SQL
        run: node export-to-d1.js

      - name: Push drafts to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          npx wrangler d1 execute gymtastic-db --remote --file=../import-pages.sql

      - name: Regenerate sitemaps
        run: |
          curl -s -o /dev/null -w "sitemap-en: %{http_code}\n" "https://gymtastic.cc/sitemap-en.xml"
          curl -s -o /dev/null -w "sitemap:    %{http_code}\n" "https://gymtastic.cc/sitemap.xml"
